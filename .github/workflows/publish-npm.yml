name: Publish Node SDK and CLI to npm

on:
  workflow_dispatch:

concurrency:
  group: publish-npm-sdk
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Verify and publish
    runs-on: ubuntu-latest
    steps:
      - name: Check out the release source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: npm ci

      - name: Verify public SDK surfaces
        run: npm run verify

      - name: Publish Node SDK with provenance
        run: npm publish --workspace=thorbit-sdk --provenance --access public

      - name: Publish CLI with provenance
        run: npm publish --workspace=thorbit-cli --provenance --access public
